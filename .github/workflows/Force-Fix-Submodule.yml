name: Force Fix Submodule
on: [workflow_dispatch]
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    # 确保Git配置正确
    - name: Configure Git
      run: |
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        
    # 安全移除子模块引用（忽略错误）
    - name: Remove submodule references
      run: |
        # 尝试移除配置（忽略错误）
        git config -f .gitmodules --remove-section submodule.libs/hbb_common || true
        git config -f .git/config --remove-section submodule.libs/hbb_common || true
        
        # 强制删除缓存和物理文件
        git rm --cached -f libs/hbb_common || true
        rm -rf .git/modules/libs/hbb_common || true
        rm -rf libs/hbb_common || true
        
        # 提交可能存在的.gitmodules变更
        if [ -f .gitmodules ]; then
          git add .gitmodules
          git commit -m "Remove submodule configuration" || echo "No submodule config changes"
        fi
        
    # 重新添加子模块
    - name: Re-add submodule correctly
      run: |
        # 确保目录存在
        mkdir -p libs/hbb_common
        
        # 重新添加子模块
        git submodule add --force https://github.com/zionlio/hbb_common.git libs/hbb_common
        
        # 初始化和更新
        git submodule update --init --force
        
        # 检查状态
        git submodule status
        
    # 提交最终更改
    - name: Commit and push
      run: |
        git add .
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Fix submodule reference"
          git push origin HEAD:${{ github.ref }}
        fi
